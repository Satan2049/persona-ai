name: Backend

on:
  push:
    paths:
      - "apps/backend/**"
      - "data/**"
      - "ui/**"
  pull_request:
    paths:
      - "apps/backend/**"
      - "data/**"
      - "ui/**"

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install -r apps/backend/requirements.txt
      - name: Import smoke test
        run: |
          cd apps/backend
          python -c "from app.main import app; from app.paths import repo_root; print(app.title, repo_root())"
